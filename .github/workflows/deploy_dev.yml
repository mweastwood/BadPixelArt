name: Deploy (Dev)

on:
  push:
    branches: [fix/deploy-dev-workflow-setup-node]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_dev_firebase_web:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Inspect Service Account Structure
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BAD_PIXEL_ART_DEV }}
        run: |
          python3 -c '
          import os, json
          sa_json = os.environ.get("SA_JSON", "")
          print("Length of SA_JSON env var:", len(sa_json))
          try:
              data = json.loads(sa_json)
              print("JSON keys:", list(data.keys()))
              pk = data.get("private_key", "")
              print("Private key length:", len(pk))
              masked_pk = "".join("X" if c.isalnum() else c for c in pk)
              print("Masked private key:")
              print(repr(masked_pk))
          except Exception as e:
              print("Error:", e)
          '

      - name: Verify Firebase Service Account Secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BAD_PIXEL_ART_DEV }}" ]; then
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT_BAD_PIXEL_ART_DEV is empty or not configured in GitHub Secrets!"
            exit 1
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web App
        run: flutter build web --release --target lib/main_dev.dart

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          entryPoint: ./app
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BAD_PIXEL_ART_DEV }}'
          channelId: live
          projectId: bad-pixel-art-dev
          firebaseToolsVersion: '15.22.3'
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

  deploy_dev_firebase_android:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BAD_PIXEL_ART_DEV }}" ]; then
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT_BAD_PIXEL_ART_DEV is empty or not configured in GitHub Secrets!"
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 is empty or not configured in GitHub Secrets!"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build Android APK
        run: flutter build apk --release --flavor dev --target lib/main_dev.dart
        env:
          ANDROID_KEYSTORE_PATH: "release.keystore"
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: "1:402346842627:android:d409cb5be6382660ae8c36"
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BAD_PIXEL_ART_DEV }}
          groups: testers
          file: app/build/app/outputs/flutter-apk/app-dev-release.apk
