<!DOCTYPE html>
<html>
<head>
  <!--

    The path provided below has to start and end with a slash "/" in order for

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="bad_pixel_art">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>bad_pixel_art</title>
  <link rel="manifest" href="manifest.json">
  <script>
    var Module = {
      locateFile: function(file) {
        return 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/' + file;
      }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.chromeAi = {
      async checkStatus() {
        try {
          if (!window.ai) {
            console.warn('[BadPixelArt] window.ai is not defined. Ensure you are using Google Chrome Desktop and have enabled the optimization guide flag at chrome://flags/#optimization-guide-on-device-model.');
            return 'unavailable';
          }
          if (!window.ai.languageModel) {
            console.warn('[BadPixelArt] window.ai.languageModel is not defined. Ensure you have enabled the Prompt API flag at chrome://flags/#prompt-api-for-sharing (or #prompt-api-for-gemini-nano).');
            return 'unavailable';
          }
          const capabilities = await window.ai.languageModel.capabilities();
          console.log('[BadPixelArt] window.ai.languageModel capabilities:', capabilities);
          return capabilities.available; // 'readily', 'after-download', 'no'
        } catch (e) {
          console.error('[BadPixelArt] Error checking window.ai capabilities:', e);
          return 'unavailable';
        }
      },
      async triggerDownload() {
        try {
          if (!window.ai || !window.ai.languageModel) {
            return;
          }
          // Creating a session can trigger download automatically if status is 'after-download'
          const session = await window.ai.languageModel.create();
          session.destroy();
        } catch (e) {
          console.error('Error triggering download:', e);
        }
      },
      async getNextStroke(prompt, systemInstruction) {
        try {
          if (!window.ai || !window.ai.languageModel) {
            return null;
          }
          const session = await window.ai.languageModel.create({
            systemPrompt: systemInstruction
          });
          const response = await session.prompt(prompt);
          session.destroy();
          return response;
        } catch (e) {
          console.error('Error getting next stroke from window.ai:', e);
          return null;
        }
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
